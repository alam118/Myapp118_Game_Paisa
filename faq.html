<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ - Smart Gamer Guide</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-bar">
    <div class="logo" onclick="location.href='index.html'">🎮 <span>SmartGamer</span></div>
    <div class="app-bar-actions">
      <button onclick="history.back()">←</button>
    </div>
  </header>

  <div class="section-header">
    <h2>❓ अक्सर पूछे जाने वाले सवाल</h2>
  </div>

  <div style="padding: 0 20px;" id="faqContainer">
    <!-- JS से डायनामिक -->
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">🏠 होम</a>
    <a href="games.html" class="nav-item">🎮 गेम्स</a>
    <a href="articles.html" class="nav-item">📰 आर्टिकल्स</a>
    <a href="favorites.html" class="nav-item">⭐ फेवरेट</a>
    <a href="profile.html" class="nav-item">👤 प्रोफाइल</a>
  </nav>

  <script src="data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const container = document.getElementById('faqContainer');
      container.innerHTML = faqData.map((faq, index) => `
        <div class="faq-item" onclick="toggleFAQ(this)">
          <div class="question">
            <span>${faq.question}</span>
            <span class="arrow">▼</span>
          </div>
          <div class="answer">${faq.answer}</div>
        </div>
      `).join('');
    });

    function toggleFAQ(element) {
      element.classList.toggle('open');
    }
  </script>
</body>
</html>
